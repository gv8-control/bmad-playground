# CI quality pipeline — bmad-easy
# Stack: fullstack (Nx monorepo — Yarn, Next.js + NestJS)
# Framework: Playwright (E2E) + Jest/@nestjs/testing (unit/integration)
#
# All stages active: lint, unit/integration, E2E (4 shards), burn-in.

name: Test Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly burn-in: Sundays at 02:00 UTC
    - cron: '0 2 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint all apps and libs
        run: yarn nx run-many --target=lint --all --parallel=4

  # ── Unit & integration tests (NestJS / Jest) ──────────────────────────────────
  unit:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run unit and integration tests
        run: yarn nx run-many --target=test --all --parallel=4 --passWithNoTests
        env:
          CI: true

      - name: Upload unit test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            apps/*/coverage/
            apps/*/test-results/
          retention-days: 30

  # ── E2E tests (Playwright, 4 shards) ─────────────────────────────────────────
  e2e:
    name: E2E Tests (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium

      - name: Start web app (dev server)
        run: yarn nx run web:dev &
        env:
          PORT: 3000

      - name: Start agent-be
        run: yarn nx run agent-be:serve &
        env:
          PORT: 3001

      - name: Wait for services
        run: yarn wait-on http://localhost:3000 http://localhost:3001/api/health --timeout 60000

      - name: Run E2E tests (shard ${{ matrix.shard }}/4)
        run: yarn playwright test --shard=${{ matrix.shard }}/4
        env:
          CI: true
          BASE_URL: http://localhost:3000

      - name: Upload E2E results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  # ── Burn-in (flaky detection, 10 iterations) ──────────────────────────────────
  burn-in:
    name: Burn-In (Flaky Detection)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: e2e
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium

      - name: Start web app (dev server)
        run: yarn nx run web:dev &
        env:
          PORT: 3000

      - name: Start agent-be
        run: yarn nx run agent-be:serve &
        env:
          PORT: 3001

      - name: Wait for services
        run: yarn wait-on http://localhost:3000 http://localhost:3001/api/health --timeout 60000

      - name: Run burn-in loop (10 iterations)
        env:
          CI: true
          BASE_URL: http://localhost:3000
          BURN_IN_COUNT: '10'
        run: |
          # Security: inputs passed through env: to prevent script injection
          echo "Starting burn-in loop — detecting flaky tests"
          for i in $(seq 1 "$BURN_IN_COUNT"); do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Burn-in iteration $i/$BURN_IN_COUNT"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            yarn playwright test || exit 1
          done
          echo "Burn-in complete — no flaky tests detected"

      - name: Upload burn-in failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-failures
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  # ── Report (aggregate results) ────────────────────────────────────────────────
  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [unit, e2e, burn-in]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate summary
        env:
          UNIT_RESULT: ${{ needs.unit.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          BURN_IN_RESULT: ${{ needs.burn-in.result }}
        run: |
          # Security: inputs passed through env: to prevent script injection
          echo "## Test Execution Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unit & Integration | $UNIT_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| E2E (4 shards) | $E2E_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Burn-in | $BURN_IN_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$BURN_IN_RESULT" = "failure" ]; then
            echo ":warning: **Flaky tests detected** — review burn-in artifacts" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$E2E_RESULT" = "failure" ]; then
            echo ":x: **E2E tests failed** — review shard artifacts" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$UNIT_RESULT" = "failure" ]; then
            echo ":x: **Unit/integration tests failed**" >> "$GITHUB_STEP_SUMMARY"
          fi

# ============================================================================
# EXTENSION PATTERNS — Script Injection Prevention
# ============================================================================
# When extending into reusable workflows (on: workflow_call) or manual
# dispatch (on: workflow_dispatch), NEVER use ${{ inputs.* }} directly in
# run: blocks. Pass through env: intermediaries.
#
# Inputs must be DATA, not COMMANDS. Fixed commands only; inputs as arguments.
#
# Example (workflow_call):
#
# on:
#   workflow_call:
#     inputs:
#       test-grep:
#         description: 'Test filter pattern (data — not a command)'
#         type: string
#         required: false
#         default: ''
#
# jobs:
#   test:
#     runs-on: ubuntu-latest
#     steps:
#       - name: Run E2E tests
#         env:
#           TEST_GREP: ${{ inputs.test-grep }}
#         run: |
#           # Security: inputs passed through env: to prevent script injection
#           if [ -n "$TEST_GREP" ]; then
#             yarn playwright test --grep "$TEST_GREP"
#           else
#             yarn playwright test
#           fi
# ============================================================================
