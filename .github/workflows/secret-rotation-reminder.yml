name: Secret Rotation Reminder

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: secret-rotation-reminder
  cancel-in-progress: true

jobs:
  check-secret-rotations:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Create secret-rotation label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create secret-rotation --color FBCA04 --description "Secret rotation reminder" || echo "Label creation failed (may already exist)"

      - name: Check for secrets due or approaching rotation
        id: check-rotations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG_PATH: .github/secret-rotation-config.json
        run: |
          REMINDERS=$(node .github/scripts/check-rotations.js "$CONFIG_PATH")
          echo "reminders=$REMINDERS" >> "$GITHUB_OUTPUT"
          if [ "$REMINDERS" = "[]" ]; then
            echo "No secrets due for rotation."
          else
            echo "Found secrets due for rotation."
          fi

      - name: Create or update rotation issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REMINDERS: ${{ steps.check-rotations.outputs.reminders }}
          REPO: ${{ github.repository }}
          RUNBOOK_PATH: docs/runbooks/secret-rotation-schedule.md
        run: |
          set -o pipefail
          if [ -z "$REMINDERS" ] || [ "$REMINDERS" = "null" ]; then
            echo "No reminders to process."
            exit 0
          fi
          echo "$REMINDERS" | jq -c '.[]' | while IFS= read -r item; do
            SECRET_NAME=$(echo "$item" | jq -r '.name')
            DUE_DATE=$(echo "$item" | jq -r '.dueDate')
            RUNBOOK_SECTION=$(echo "$item" | jq -r '.runbookSection')
            RUNBOOK_REF=$(echo "$item" | jq -r '.runbookRef // empty')
            TITLE="Rotate ${SECRET_NAME} — due ${DUE_DATE}"
            BODY="This secret is approaching or has passed its rotation due date. Follow the rotation procedure in [${RUNBOOK_PATH}](${RUNBOOK_PATH}), ${RUNBOOK_SECTION}."
            if [ -n "$RUNBOOK_REF" ]; then
              BODY="${BODY} For the detailed procedure, see [${RUNBOOK_REF}](${RUNBOOK_REF})."
            fi
            # M9: Retry gh issue list once after 5s if no existing issues found,
            # to handle GitHub issue search index eventual consistency.
            EXISTING=$(gh issue list --repo "$REPO" --search "Rotate ${SECRET_NAME} in:title" --state open --json number,title 2>/dev/null) || { echo "Warning: gh issue list failed for ${SECRET_NAME}, skipping to avoid duplicates" >&2; EXISTING='[]'; }
            EXACT_MATCH=$(echo "$EXISTING" | jq --arg t "$TITLE" '[.[] | select(.title == $t)] | length' 2>/dev/null || echo 0)
            if [ "$EXACT_MATCH" -eq 0 ]; then
              sleep 5
              EXISTING_RETRY=$(gh issue list --repo "$REPO" --search "Rotate ${SECRET_NAME} in:title" --state open --json number,title 2>/dev/null) || { echo "Warning: gh issue list retry failed for ${SECRET_NAME}" >&2; EXISTING_RETRY='[]'; }
              EXACT_MATCH=$(echo "$EXISTING_RETRY" | jq --arg t "$TITLE" '[.[] | select(.title == $t)] | length' 2>/dev/null || echo 0)
            fi
            if [ "$EXACT_MATCH" -gt 0 ]; then
              echo "Issue already exists for ${SECRET_NAME} (due ${DUE_DATE}) — skipping."
            else
              # M9: Log to stderr on failure instead of silently continuing.
              if ! gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY" --label "secret-rotation"; then
                echo "ERROR: Failed to create issue: ${TITLE}" >&2
                continue
              fi
              echo "Created issue: ${TITLE}"
            fi
          done
